name: Keep Streamlit App Awake

on:
  schedule:
    # 每 20 分鐘執行一次，確保不進入休眠
    - cron: '*/20 * * * *'
  workflow_dispatch: # 讓您可以手動點擊 Actions 測試

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Deep Ping
        run: |
          # 去掉 -I，改用 -sL 模擬真實訪問
          curl -sL --max-redirs 5 \
          -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          "https://catch-you-ltc3-0.hf.space" > /dev/null
          
          echo "Ping sent at $(date)"

name: Keep Streamlit App Awake

on:
  schedule:
    # 改為每 3 小時執行一次，確保覆蓋率
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Deep Ping
run: |
  # -I 代表只抓取 Header，不下載網頁內容，減少被判定為攻擊的機率
  # --max-redirs 5 限制跳轉次數，避免 50 次死循環
  curl -I --max-redirs 5 -A "Mozilla/5.0" https://uia-catchyou.streamlit.app/
